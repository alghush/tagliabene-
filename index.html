<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="img/logota.png" >
    <title>Tagliabene</title>
</head>
<body>

<main class="content-wrapper">
    <section class="splash">

            <div class="splash__logo">
            <img src="/img/logota.png" alt="Logo Tagliabene">
        </div>
        <p class="splash__sub">nacido para llevar el sabor de las pastas artesanales a cada hogar</p>
        <div class="scroll-arrow">↓</div>
        <div class="splash__btns">

                        <!-- VER PRODUCTOS (acordeón CSS puro) -->
            <input type="checkbox" id="toggle-productos" class="checkbox__submenu">
                <label class="splash__btn splash__btn--menu" for="toggle-productos">
                <span class="splash__btn-left">
                <span class="splash__btn-icon"><i class="ti ti-tools-kitchen-2"></i></span>
                Ver productos
                </span>
                <i class="ti ti-chevron-down splash__arrow"></i>
                </label>

            <div class="splash__acordeon-inner">
                <div class="splash__acordeon-wrap">
                    <a class="splash__acordeon-item" href="/page/pastas.html">
                        <i class="ti ti-bowl-spoon"></i> Pastas
                    </a>
                    <a class="splash__acordeon-item" href="/page/congelados.html">
                        <i class="ti ti-snowflake"></i> Congelados
                    </a>
                    <a class="splash__acordeon-item" href="/page/bebidas.html">
                        <i class="ti ti-bottle"></i> Bebidas
                    </a>
                    <a class="splash__acordeon-item" href="/page/almacen.html">
                        <i class="ti ti-shopping-cart"></i> Almacén
                    </a>
                </div>
            </div>


            <!-- WHATSAPP -->
            <a class="splash__btn splash__btn--wa"
                href="https://api.whatsapp.com/send?phone=5493415509995&text=%F0%9F%8D%9D%20%C2%A1Bienvenid@%20a%20la%20casa%20Tagliabene%20%E2%9D%84%EF%B8%8F">
                <span class="splash__btn-icon"><i class="ti ti-brand-whatsapp"></i></span>
                Hacer un pedido
            </a>

            <!-- UBICACION -->
            <a class="splash__btn splash__btn--ubi"
                href="https://www.google.com/maps/place/Pueyrred%C3%B3n+67,+S2000LHA+Rosario,+Santa+Fe/@-32.9345515,-60.6549653,17z">
                <span class="splash__btn-icon"><i class="ti ti-map-pin"></i></span>
                Pueyrredón 67 bis, Rosario
            </a>

        </div>

        <a class="splash__skip" href="/page/home.html">Entrar a la página →</a>

    </section>
</main>

</body>
</html>
